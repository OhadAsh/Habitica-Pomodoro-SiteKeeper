name: Playwright E2E (Chromium + Extension)

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: E2E (Chromium extension)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers + system deps (incl. xvfb)
        run: npx playwright install --with-deps chromium

      # Chrome extensions require headless:false, which needs a real display.
      # xvfb-run provides a virtual framebuffer so the headed browser works on
      # the headless CI runner.
      - name: Run Playwright tests
        run: xvfb-run --auto-servernum -- npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14

      - name: Upload test results (videos / screenshots)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: tests/test-results/
          retention-days: 7
          if-no-files-found: ignore
